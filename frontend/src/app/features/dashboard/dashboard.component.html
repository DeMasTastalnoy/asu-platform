<div class="page">
  <div class="topbar">
    <span class="page-title">Дашборд</span>
    <span class="role-badge">{{ user()?.primary_role }}</span>
  </div>
  <div class="content">
    <div class="metrics">
      <div class="metric-card">
        <div class="metric-val">{{ stats.courses }}</div>
        <div class="metric-lbl">Курсов</div>
      </div>
      <div class="metric-card">
        <div class="metric-val">—</div>
        <div class="metric-lbl">Симуляций</div>
      </div>
      <div class="metric-card">
        <div class="metric-val">—</div>
        <div class="metric-lbl">Студентов</div>
      </div>
      <div class="metric-card">
        <div class="metric-val">—</div>
        <div class="metric-lbl">Ср. успеваемость</div>
      </div>
    </div>
    <div class="welcome-card">
      <h2>Добро пожаловать, {{ user()?.full_name || user()?.username }}!</h2>
      <p>Платформа дистанционного обучения операторов АСУ готова к работе.</p>
      <div class="quick-actions">
        <a routerLink="/courses" class="action-btn">Перейти к курсам</a>
        <a routerLink="/simulator" class="action-btn outline"
           *ngIf="user()?.primary_role !== 'student'">
          Открыть конструктор
        </a>
      </div>
    </div>
  </div>
</div>
