<div class="page">
  <div class="topbar">
    <a [routerLink]="['/courses', courseId]" class="back-btn">← Назад к курсу</a>
    <span class="page-title">{{ module?.title ?? 'Загрузка...' }}</span>
    <span class="type-badge" *ngIf="module">{{ getTypeLabel(module.type) }}</span>
  </div>

  <div class="content">
    <div class="loading" *ngIf="loading">Загрузка...</div>

    <ng-container *ngIf="module && !loading">

      <!-- Видео -->
      <div class="video-wrap" *ngIf="module.type === 'video' && module.file_url">
        <video [src]="fileUrl()" controls preload="metadata"></video>
      </div>

      <!-- Документ -->
      <ng-container *ngIf="module.type === 'document' && module.file_url">
        <div class="doc-preview" *ngIf="isPdf">
          <iframe [src]="safeDocUrl" title="Документ"></iframe>
        </div>
        <div class="doc-link">
          <a [href]="fileUrl()" target="_blank" class="btn-primary">📄 Открыть / скачать документ</a>
        </div>
      </ng-container>

      <!-- Лекция — HTML-контент -->
      <div class="lecture-content" *ngIf="module.content" [innerHTML]="module.content"></div>

      <div class="empty-content" *ngIf="!module.content && !module.file_url">
        Содержимое модуля ещё не добавлено.
      </div>

      <div class="module-footer">
        <span class="done-badge" *ngIf="completed">✓ Модуль завершён</span>
        <button class="btn-complete" (click)="complete()">
          {{ completed ? 'Готово, вернуться к курсу' : '✓ Отметить как завершённый' }}
        </button>
      </div>

    </ng-container>
  </div>
</div>
