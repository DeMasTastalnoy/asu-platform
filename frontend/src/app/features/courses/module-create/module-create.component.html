<div class="page">
  <div class="topbar">
    <div class="topbar-left">
      <a [routerLink]="['/courses', courseId]" class="back-btn">← Назад к курсу</a>
      <span class="page-title">Новый модуль</span>
    </div>
  </div>

  <div class="content">
    <div class="form-card">
      <form [formGroup]="form" (ngSubmit)="submit()">

        <div class="field">
          <label>Название модуля <span class="required">*</span></label>
          <input type="text" formControlName="title"
                 placeholder="Например: Введение в АСУ ТП"
                 [class.error]="form.get('title')?.invalid && form.get('title')?.touched"/>
        </div>

        <div class="field">
          <label>Тип модуля</label>
          <div class="type-grid">
            <div class="type-option"
                 *ngFor="let t of moduleTypes"
                 [class.selected]="selectedType === t.value"
                 (click)="form.get('type')?.setValue(t.value)">
              <span class="type-icon" [class]="'icon-' + t.value">
                {{ t.value === 'lecture' ? 'Л' : t.value === 'video' ? 'В' :
                   t.value === 'document' ? 'Д' : t.value === 'test' ? 'Т' : 'С' }}
              </span>
              <span>{{ t.label }}</span>
            </div>
          </div>
        </div>

        <div class="field" *ngIf="selectedType === 'lecture'">
          <label>Содержимое лекции</label>
          <textarea formControlName="content" rows="8"
                    placeholder="Текст лекции в формате HTML или Markdown..."></textarea>
        </div>

        <div class="field" *ngIf="selectedType === 'video' || selectedType === 'document'">
          <label>Ссылка на файл / видео</label>
          <input type="text" formControlName="file_url"
                 placeholder="https://..."/>
        </div>

        <div class="field-row">
          <div class="field">
            <label>Порядковый номер</label>
            <input type="number" formControlName="order_num" min="0"/>
          </div>
          <div class="field checkbox-field">
            <label class="checkbox-label">
              <input type="checkbox" formControlName="is_required"/>
              Обязательный модуль
            </label>
          </div>
        </div>

        <div class="error-msg" *ngIf="error">{{ error }}</div>

        <div class="form-actions">
          <a [routerLink]="['/courses', courseId]" class="btn-outline">Отмена</a>
          <button type="submit" class="btn-primary" [disabled]="loading || form.invalid">
            {{ loading ? 'Создание...' : 'Добавить модуль' }}
          </button>
        </div>

      </form>
    </div>
  </div>
</div>
