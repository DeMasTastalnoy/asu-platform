<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <h1>АСУ-Платформа</h1>
      <p>Регистрация нового пользователя</p>
    </div>

    <!-- Экран успеха: аккаунт ждёт подтверждения администратором -->
    <div class="reg-success" *ngIf="success">
      <div class="reg-success-icon">✓</div>
      <p class="reg-success-title">Регистрация принята</p>
      <p class="reg-success-text">
        Аккаунт создан и ожидает подтверждения администратором.
        Вход станет доступен после активации.
      </p>
      <a routerLink="/auth/login" class="reg-success-btn">Перейти ко входу</a>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" *ngIf="!success">
      <div class="field">
        <label>Логин</label>
        <input type="text" formControlName="username" placeholder="Введите логин"/>
      </div>
      <div class="field">
        <label>ФИО</label>
        <input type="text" formControlName="full_name" placeholder="Фамилия Имя Отчество"/>
      </div>
      <div class="field">
        <label>Email</label>
        <input type="email" formControlName="email" placeholder="email@example.com"/>
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" formControlName="password" placeholder="Минимум 8 символов"/>
        <span class="hint-error"
              *ngIf="form.get('password')?.invalid && form.get('password')?.touched">
          Минимум 8 символов
        </span>
      </div>
      <div class="field">
        <label>Подтверждение пароля</label>
        <input type="password" formControlName="password2" placeholder="Повторите пароль"/>
      </div>
      <div class="error-msg" *ngIf="error">{{ error }}</div>
      <button type="submit" [disabled]="loading">
        {{ loading ? 'Регистрация...' : 'Зарегистрироваться' }}
      </button>
    </form>

    <div class="login-footer">
      <a routerLink="/auth/login">← Войти</a>
    </div>
  </div>
</div>
