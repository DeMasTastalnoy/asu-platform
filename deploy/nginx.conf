# nginx-конфиг для АСУ-Платформы (один домен).
# Положить в /etc/nginx/sites-available/asu-platform и слинковать в sites-enabled.
# Замените server_name и пути (PROJECT_DIR) на свои.

server {
    listen 80;
    server_name example.com;          # ← ваш домен или IP сервера

    # Под загрузку файлов модулей (см. UPLOAD_MAX_MB в .env). Запас сверху.
    client_max_body_size 2200M;

    # ── Angular SPA (собранная статика) ──
    root /var/www/asu-platform/frontend/dist/frontend/browser;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;   # SPA-роутинг → index.html
    }

    # ── API → gunicorn (Django) ──
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;            # длинные загрузки файлов
    }

    # ── Админка Django ──
    location /admin/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host              $host;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ── Статика Django (collectstatic): админка, DRF ──
    location /static/ {
        alias /var/www/asu-platform/backend/staticfiles/;
        expires 30d;
    }

    # ── Media: PDF-сертификаты, загруженные документы/видео ──
    location /media/ {
        alias /var/www/asu-platform/backend/media/;
        expires 7d;
    }
}

# HTTPS добавляется автоматически утилитой certbot (см. DEPLOY.md):
#   sudo certbot --nginx -d example.com
# После выпуска сертификата — в backend/.env поставить SECURE=True.
